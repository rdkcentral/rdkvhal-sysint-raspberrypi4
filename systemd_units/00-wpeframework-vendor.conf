[Unit]
Wants=enable-transition-markers.service
After=enable-transition-markers.service

[Service]
Environment="LD_PRELOAD=/usr/lib/libwesteros_gl.so.0"
Environment="WESTEROS_SINK_USE_ESSRMGR=1"
Environment="WESTEROS_SINK_USE_FREERUN=1"
Environment="WESTEROS_GL_USE_GENERIC_AVSYNC=1"
Environment="WESTEROS_GL_USE_REFRESH_LOCK=1"
Environment="WESTEROS_DRM_CARD=/dev/dri/card1"
Environment="WESTEROS_GL_GRAPHICS_MAX_SIZE=1920x1080"
Environment="PLAYERSINKBIN_USE_WESTEROSSINK=1"
Environment="AAMP_ENABLE_WESTEROS_SINK=1"
Environment="WESTEROS_GL_NO_VBLANK=1"

